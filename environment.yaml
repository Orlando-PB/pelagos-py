name: pelagos_py
channels:
  - conda-forge
dependencies:
  # Core environment
  - python
  - pip
  - numpy
  - pandas
  - scipy
  - xarray
  - netcdf4
  - h5py
  - h5netcdf
  - zarr
  - numcodecs
  - gsw
  - geopy
  - scikit-learn
  - matplotlib
  - seaborn
  - requests
  - python-graphviz
  - polars
  - geodatasets
  - shapely
  - geopandas
  - pvlib
  - tqdm
  - pyyaml
  - pip

  # Documentation and development tools
  - ipykernel
  - jupyterlab
  - sphinx
  - sphinx-autoapi
  - sphinx-rtd-theme
  - pydata-sphinx-theme
  - nbsphinx
  - numpydoc
  - sphinxcontrib-napoleon
  - sphinxcontrib-serializinghtml
  - myst-parser
  - pytest
  - black
  - pre-commit
  - cartopy

  # Pypi only
  - pip:
    - glidertools
    - rstcloth
    - compliance-checker
    - cc-plugin-og
    - autoapi
    - sphinx_copybutton
    - sphinx_last_updated_by_git
    - sphinx_codeautolink
    - sphinx_design
    - -e .