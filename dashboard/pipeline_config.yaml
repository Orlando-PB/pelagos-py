pipeline:
  name: Example CTD Processing Pipeline
  description: A pipeline for processing CTD data
  visualisation: false
steps:
  - name: Load OG1
    parameters:
      file_path: ../examples/data/OG1/Nelson_646_R.nc
    diagnostics: false
  - name: Apply QC
    parameters:
      qc_settings:
        impossible date test: {}
        impossible location test: {}
        position on land test: {}
        impossible speed test: {}
    diagnostics: true
  - name: Interpolate Data
    parameters:
      qc_handling_settings:
        flag_filter_settings:
          PRES:
            - 3
            - 4
            - 9
          LATITUDE:
            - 3
            - 4
            - 9
          LONGITUDE:
            - 3
            - 4
            - 9
        reconstruction_behaviour: replace
        flag_mapping:
          '3': 8
          '4': 8
          '9': 8
    diagnostics: true
  - name: Derive CTD
    parameters:
      to_derive:
        - DEPTH
    diagnostics: false
  - name: Find Profiles
    parameters:
      gradient_thresholds:
        - 0.033
        - -0.033
      filter_window_sizes:
        - 20s
        - 20s
      depth_column: DEPTH
    diagnostics: true
  - name: Data Export
    parameters:
      export_format: netcdf
      output_path: ../examples/data/OG1/Nelson_646_R_Processed.nc
