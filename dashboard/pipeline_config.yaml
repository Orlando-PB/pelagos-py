pipeline:
  name: Modern Glider Pipeline
  description: Full processing pipeline from Load to Export
  visualisation: true
steps:
  - name: Load OG1
    parameters:
      file_path: /Users/orlpru/Desktop/OG1_Data/Nelson_646_R.nc
    diagnostics: false
  - name: Find Profiles Beta
    parameters:
      depth_column: PRES
      resample_cadence: 30s
      gradient_thresholds:
        - 0.033
        - -0.033
      horiz_gradient_threshold: 0.01
      filter_window_sizes:
        - 1
        - 2
      edge_squeeze: 0
      dive_scale: 15
      max_depth_gap: 60
      min_horizontal_duration: 20min
      min_horizontal_depth: 1
    diagnostics: true
